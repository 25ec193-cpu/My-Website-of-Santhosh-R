<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My First Website</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f2f2f2;
}

h1 {
    color: blue;
}

button {
    padding: 10px 20px;
    background: green;
    color: white;
    border: none;
    border-radius: 5px;
    
}
    button:hover {

    transform: scale(1.1);

}
img {
    border-radius:50%;

    animation: zoom 2s infinite;
}


@keyframes zoom {

    0% {
        transform: scale(1);
    }

    50% {
        transform: scale(1.1);
    }

    100% {
        transform: scale(1);
    }

}
nav {
    background: black;
       
    padding: 15px;
}

nav a {
    color: yellow;
    margin: 20px;
    text-decoration: none;
}

.container {
    width: 90%;
    margin: auto;
}

section {
    background: white;
    margin: 15px;
    padding: 20px;
    border-radius: 10px;

    animation: slide 1s;
}
#music {

    background: white;
    padding: 30px;
    margin: 20px;
    border-radius: 15px;

}
    #cover{
    border-radius:15px;
    animation:none;
}

#progress{
    width:250px;
}

@keyframes slide {

    from {
        opacity: 0;
        transform: translateY(50px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }

}
    .menu {
    display: none;
}
@media (max-width:600px){

    .menu {
        display: block;
        margin: auto;
        background: black;
        color: yellow;
        font-size: 20px;
    }

    #links {
        display: none;
    }

    #links a {
        display: block;
        margin: 10px;
    }#cover{
    width:150px;
}

#progress{
    width:90%;
}

#music button{
    display:block;
    width:90%;
    margin:10px auto;
}

    section {
        margin: 10px;
        padding: 15px;
    }

}
    .dark {
    background: black;
    color: white;
}

.dark section {
    background: #333;
    color: white;
}

.dark nav {
    background: #111;
}

.dark button {
    background: #444;
    color: white;
}
</style>

</head>

<body>

<nav>

<button class="menu" onclick="openMenu()">☰ Menu</button>

<div id="links">

<a href="#home">Home</a>
<a href="#about">About</a>
<a href="#contact">Contact</a>
<button onclick="changeTheme()">🌙 Theme</button>
</div>

</nav>
<div class="container">

<section id="home">

<h1 id ="title">Welcome to My Website</h1>
<img src="photo.jpg" width="200">
<p>I created my first website!</p>

<button onclick="hello()">Click Me</button>

</section>


<section id="about">

<h2>About Me</h2>

<p>I am learning web development.</p>
<button onclick="changeColor()">Background color Button </button>
<section id="music">

<section id="music">

<h2>🎵 My Music</h2>

<img id="cover" src="cover.jpg" width="200">

<br><br>

<audio id="player">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<input type="range" id="progress" value="0" min="0" max="100">

<br><br>

<button onclick="playMusic()">▶️ Play</button>

<button onclick="pauseMusic()">⏸ Pause</button>

<button onclick="repeatMusic()">🔁 Repeat</button>

</section>
</section>



<section id="contact">

<h2>Contact</h2>

<input id="name" placeholder="Enter your name">
<br><br>

<input id="email" placeholder="Enter your email">
<br><br>

<button onclick="submitForm()">Submit</button>

<h3 id="msg"></h3>

</section>
</div>
<script>
function hello(){
    document.getElementById("title").innerHTML = "Hello Santhosh!";
}


function changeColor(){
    document.body.style.background = "black";
}


function submitForm(){

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;

    document.getElementById("msg").innerHTML =
    "Thank you " + name + "! We received " + email;

}


function openMenu(){

    let links = document.getElementById("links");

    if(window.getComputedStyle(links).display === "none"){
        links.style.display = "block";
    }
    else{
        links.style.display = "none";
    }

}
    function playMusic(){

    let music = document.getElementById("player");

    music.play();

}


function pauseMusic(){

    let music = document.getElementById("player");

    music.pause();

}
function changeTheme(){

    document.body.classList.toggle("dark");

}
function repeatMusic(){

    let music = document.getElementById("player");

    music.loop = !music.loop;

    if(music.loop){
        alert("Repeat ON");
    }
    else{
        alert("Repeat OFF");
    }

}
    let progress = document.getElementById("progress");
let player = document.getElementById("player");

player.addEventListener("timeupdate", function(){

    progress.value =
    (player.currentTime / player.duration) * 100;

});
</script>
<footer>
    <p>© 2026 My Website</p>
</footer>
</body>
</html>

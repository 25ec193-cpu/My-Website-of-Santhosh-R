<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My First Website</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f2f2f2;
}

h1 {
    color: blue;
}

button {
    padding: 10px 50px;
    background: green;
    color: white;
    border: none;
    border-radius: 5px;
}
img {
    border-radius: 50%;
}
nav {
    background: black;
       
    padding: 15px;
}

nav a {
    color: yellow;
    margin: 220px;
    text-decoration: none;
}

.container {
    width: 90%;
    margin: auto;
}

section {
    background: white;
    margin: 15px;
    padding: 20px;
    border-radius: 10px;
}
@media (max-width: 600px) {
    body {
        font-size: 14px;
    }

    section {
        margin: 10px;
        padding: 15px;
    }
}
</style>

</head>

<body>

<nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
</nav>
<div class="container">

<section id="home">

<h1 id ="title">Welcome to My Website</h1>
<img src="photo.jpg" width="200">
<p>I created my first website!</p>

<button onclick="hello()">Click Me</button>

</section>


<section id="about">

<h2>About Me</h2>

<p>I am learning web development.</p>
<button onclick="changeColor()">Background color Button </button>

</section>



<section id="contact">

<h2>Contact</h2>

<input id="name" placeholder="Enter your name">
<br><br>

<input id="email" placeholder="Enter your email">
<br><br>

<button onclick="submitForm()">Submit</button>

<h3 id="msg"></h3>

</section>
</div>
<script>
function hello(){
    document.getElementById("title").innerHTML = "Hello Santhosh!";
}
function changeColor(){
    document.body.style.background = "black";
}
function submitForm() {

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;

    document.getElementById("msg").innerHTML =
        "Thank you " + name + "! We received " + email;

}</script>
<footer>
    <p>© 2026 My Website</p>
</footer>
</body>
</html>
